name: Build Electron app

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            script: build:mac
            artifact: aura-player-macos
          - name: Windows NSIS
            os: windows-latest
            script: build:win
            artifact: aura-player-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # youtube-dl-exec postinstall hits api.github.com (rate limit on CI runners). yt-dlp is fetched by scripts/ensure-ytdlp-standalone.js after npm ci.
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-electron/**
