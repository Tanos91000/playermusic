name: Publish Electron release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            npm_script: publish:github:mac
          - name: Windows NSIS
            os: windows-latest
            npm_script: publish:github:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Align tag with package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Git tag: v${TAG_VER} — package.json: ${PKG_VER}"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag v${TAG_VER} != package.json (${PKG_VER}). Fix version then tag again."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: Publish to GitHub Releases
        run: npm run ${{ matrix.npm_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
